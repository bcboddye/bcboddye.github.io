<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walmart Connect Alcohol Audience Planner</title>
  <style>
    :root {
      --blue: #0053e2;
      --spark: #ffc220;
      --green: #2a8703;
      --red: #ea1100;
      --gray-10: #f2f3f4;
      --gray-50: #bec0c2;
      --gray-100: #74767c;
      --gray-160: #2e3038;
      --white: #ffffff;
      --radius: 10px;
      --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: var(--gray-10);
      color: var(--gray-160);
    }

    .header {
      background: var(--blue);
      color: var(--white);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0, 83, 226, 0.25);
    }
    .header .star { color: var(--spark); font-size: 18px; }
    .header h1 { margin: 0; font-size: 18px; }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 4px;
    }

    .field label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--gray-100);
    }

    .field select {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--gray-50);
      border-radius: 8px;
      background: var(--white);
      font-size: 13px;
      color: var(--gray-160);
    }

    .field select:focus {
      outline: 2px solid rgba(0, 83, 226, 0.25);
      border-color: var(--blue);
    }

    .reset-wrap {
      display: flex;
      align-items: end;
    }

    .btn-reset {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--gray-50);
      border-radius: 8px;
      background: var(--white);
      color: var(--gray-160);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-reset:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .status {
      font-size: 13px;
      color: var(--gray-100);
    }
    .status b { color: var(--blue); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .group {
      border: 1px solid var(--gray-50);
      border-radius: 10px;
      overflow: hidden;
      background: var(--white);
    }

    .group h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--white);
      background: var(--blue);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .group[data-funnel="mid"] h2 { background: #0b7a8f; }
    .group[data-funnel="lower"] h2 { background: #041E42; }
    .group[data-funnel="retention"] h2 { background: var(--green); }

    .count {
      font-size: 11px;
      background: rgba(255,255,255,0.22);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .list {
      padding: 10px;
      display: grid;
      gap: 8px;
      min-height: 120px;
    }

    .aud {
      border: 1px solid var(--gray-50);
      border-radius: 8px;
      padding: 10px;
      background: #fafafa;
    }

    .aud-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .aud-name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 2px 7px;
      white-space: nowrap;
    }

    .pre-built { background: #dbeafe; color: #1d4ed8; }
    .custom { background: #ede9fe; color: #6d28d9; }
    .predictive { background: #ccfbf1; color: #0f766e; }
    .retargeting { background: #fef3c7; color: #995213; }

    .reason {
      margin-top: 6px;
      font-size: 12px;
      color: var(--gray-100);
      line-height: 1.4;
    }

    .empty {
      font-size: 12px;
      color: var(--gray-100);
      text-align: center;
      padding: 16px;
      border: 1px dashed var(--gray-50);
      border-radius: 8px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="star">★</span>
    <h1>Alcohol Audience Planner</h1>
  </div>

  <main class="container">
    <section class="card" aria-label="Filters">
      <div class="filters">
        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option value="">All</option>
            <option value="Beer">Beer</option>
            <option value="Wine">Wine</option>
            <option value="Spirits">Spirits</option>
            <option value="RTD">RTD</option>
            <option value="Non-Alcoholic">Non-Alcoholic</option>
          </select>
        </div>

        <div class="field">
          <label for="objective">Objective</label>
          <select id="objective">
            <option value="">All</option>
            <option value="Awareness">Awareness</option>
            <option value="New Buyers">New Buyers</option>
            <option value="Conversion">Conversion</option>
            <option value="Seasonal">Seasonal</option>
            <option value="Premium">Premium</option>
            <option value="Retention">Retention</option>
          </select>
        </div>

        <div class="field">
          <label for="kpi">KPI</label>
          <select id="kpi">
            <option value="">All</option>
            <option value="ROAS">ROAS</option>
            <option value="Conversions">Conversions</option>
            <option value="CTR">CTR</option>
            <option value="New to Brand %">New to Brand %</option>
          </select>
        </div>

        <div class="field">
          <label for="season">Season/Event</label>
          <select id="season">
            <option value="None">None</option>
            <option value="Tailgating">Tailgating</option>
            <option value="Holiday">Holiday</option>
            <option value="Summer">Summer</option>
            <option value="Big Game">Big Game</option>
          </select>
        </div>

        <div class="reset-wrap">
          <button id="resetBtn" class="btn-reset" type="button">Reset Filters</button>
        </div>
      </div>
    </section>

    <section class="card status" id="status" aria-live="polite"></section>

    <section class="grid" aria-label="Audience recommendations by funnel">
      <div class="group" data-funnel="upper">
        <h2>Upper Funnel <span class="count" id="count-upper">0</span></h2>
        <div class="list" id="upper"></div>
      </div>
      <div class="group" data-funnel="mid">
        <h2>Mid Funnel <span class="count" id="count-mid">0</span></h2>
        <div class="list" id="mid"></div>
      </div>
      <div class="group" data-funnel="lower">
        <h2>Lower Funnel <span class="count" id="count-lower">0</span></h2>
        <div class="list" id="lower"></div>
      </div>
      <div class="group" data-funnel="retention">
        <h2>Retention <span class="count" id="count-retention">0</span></h2>
        <div class="list" id="retention"></div>
      </div>
    </section>
  </main>

  <script>
    const audiences = [
      { name: "Alcohol Category Shoppers", type: "Pre-built", funnel: "upper", reason: "Broad category reach to maximize awareness.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["Awareness","New Buyers"], kpis: ["CTR","New to Brand %"], seasons: ["None","Tailgating","Holiday","Summer","Big Game"] },
      { name: "Sports Fans & Tailgaters", type: "Pre-built", funnel: "upper", reason: "High-reach persona tied to game-day occasions.", categories: ["Beer","RTD"], objectives: ["Awareness","Seasonal"], kpis: ["CTR"], seasons: ["Tailgating","Big Game"] },
      { name: "Party Hosts", type: "Custom", funnel: "upper", reason: "Captures social-occasion planners before purchase intent peaks.", categories: ["Beer","Wine","Spirits","RTD"], objectives: ["Awareness","Seasonal"], kpis: ["CTR"], seasons: ["Holiday","Summer","Tailgating"] },
      { name: "Premium Lifestyle Shoppers", type: "Pre-built", funnel: "upper", reason: "Strong fit for premium message framing and brand halo.", categories: ["Wine","Spirits"], objectives: ["Premium","Awareness"], kpis: ["CTR"], seasons: ["Holiday","None"] },

      { name: "In-Market Alcohol Shoppers", type: "Predictive", funnel: "mid", reason: "Modeled for active intent and strong consideration signals.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["New Buyers","Conversion"], kpis: ["Conversions","CTR","New to Brand %"], seasons: ["None","Tailgating","Holiday","Summer","Big Game"] },
      { name: "Category Considerers", type: "Predictive", funnel: "mid", reason: "People researching category choices, ideal for persuasion.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["New Buyers","Conversion"], kpis: ["Conversions","New to Brand %"], seasons: ["None","Holiday","Summer"] },
      { name: "Seasonal Occasion Planners", type: "Predictive", funnel: "mid", reason: "Best for event-led campaigns before buying window closes.", categories: ["Beer","Wine","Spirits","RTD"], objectives: ["Seasonal","Conversion"], kpis: ["Conversions"], seasons: ["Tailgating","Holiday","Summer","Big Game"] },
      { name: "Competitive Brand Switchers", type: "Custom", funnel: "mid", reason: "Targets shoppers likely to switch brands with a good offer.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["New Buyers","Conversion"], kpis: ["ROAS","Conversions","New to Brand %"], seasons: ["None","Holiday"] },

      { name: "Add-to-Cart Abandoners", type: "Retargeting", funnel: "lower", reason: "Highest conversion efficiency for ROAS-focused campaigns.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["Conversion"], kpis: ["ROAS","Conversions"], seasons: ["None","Tailgating","Holiday","Summer","Big Game"] },
      { name: "PDP Viewers", type: "Retargeting", funnel: "lower", reason: "Strong product intent from recent product detail engagement.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["Conversion"], kpis: ["ROAS","Conversions"], seasons: ["None","Holiday"] },
      { name: "Lapsed Buyers (90 Days)", type: "Retargeting", funnel: "lower", reason: "Win-back audience with proven prior purchase behavior.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["Conversion","Retention"], kpis: ["ROAS"], seasons: ["None","Holiday","Summer"] },
      { name: "High-Value Buyers", type: "Predictive", funnel: "lower", reason: "Efficiency segment for premium and performance campaigns.", categories: ["Wine","Spirits"], objectives: ["Premium","Conversion"], kpis: ["ROAS"], seasons: ["None","Holiday"] },

      { name: "Brand Loyalists", type: "Retargeting", funnel: "retention", reason: "Protect repeat rate with always-on loyalty messaging.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["Retention"], kpis: ["ROAS","Conversions"], seasons: ["None","Holiday","Summer"] },
      { name: "Frequent Category Buyers", type: "Pre-built", funnel: "retention", reason: "Retain high-frequency customers with repeat reminders.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["Retention"], kpis: ["ROAS","Conversions"], seasons: ["None","Tailgating","Holiday","Summer","Big Game"] },
      { name: "Lapsed Loyalists", type: "Retargeting", funnel: "retention", reason: "Re-activate prior loyal customers before churn deepens.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["Retention"], kpis: ["ROAS"], seasons: ["None","Holiday"] },
      { name: "CRM Known Customers", type: "Custom", funnel: "retention", reason: "Most precise first-party retention segment for lifecycle nudges.", categories: ["Beer","Wine","Spirits","RTD","Non-Alcoholic"], objectives: ["Retention"], kpis: ["ROAS","Conversions"], seasons: ["None","Tailgating","Holiday","Summer","Big Game"] }
    ];

    // Historical performance benchmarks (planner guidance dataset)
    // NOTE: New to Brand % uses latest "New Buyer" source incorporated into planning logic.
    const BENCHMARKS = {
      "Alcohol Category Shoppers":      { roas: 4.1, conversions: 980, ctr: 0.46, ntb: 42.8 },
      "Sports Fans & Tailgaters":       { roas: 3.8, conversions: 890, ctr: 0.52, ntb: 48.3 },
      "Party Hosts":                    { roas: 4.4, conversions: 1010, ctr: 0.49, ntb: 46.1 },
      "Premium Lifestyle Shoppers":     { roas: 5.1, conversions: 860, ctr: 0.44, ntb: 39.6 },
      "In-Market Alcohol Shoppers":     { roas: 5.8, conversions: 1420, ctr: 0.57, ntb: 54.7 },
      "Category Considerers":           { roas: 5.3, conversions: 1310, ctr: 0.53, ntb: 52.9 },
      "Seasonal Occasion Planners":     { roas: 5.0, conversions: 1260, ctr: 0.55, ntb: 50.8 },
      "Competitive Brand Switchers":    { roas: 6.2, conversions: 1370, ctr: 0.51, ntb: 58.4 },
      "Add-to-Cart Abandoners":         { roas: 8.4, conversions: 1780, ctr: 0.69, ntb: 31.4 },
      "PDP Viewers":                    { roas: 7.6, conversions: 1650, ctr: 0.66, ntb: 34.2 },
      "Lapsed Buyers (90 Days)":        { roas: 6.9, conversions: 1210, ctr: 0.43, ntb: 26.3 },
      "High-Value Buyers":              { roas: 7.1, conversions: 1170, ctr: 0.41, ntb: 29.7 },
      "Brand Loyalists":                { roas: 6.5, conversions: 1110, ctr: 0.39, ntb: 22.1 },
      "Frequent Category Buyers":       { roas: 6.1, conversions: 1080, ctr: 0.37, ntb: 24.9 },
      "Lapsed Loyalists":               { roas: 6.7, conversions: 990,  ctr: 0.35, ntb: 20.6 },
      "CRM Known Customers":            { roas: 7.3, conversions: 1190, ctr: 0.40, ntb: 18.9 }
    };

    const KPI_TO_METRIC = {
      'ROAS': 'roas',
      'Conversions': 'conversions',
      'CTR': 'ctr',
      'New to Brand %': 'ntb'
    };

    const ids = {
      category: document.getElementById('category'),
      objective: document.getElementById('objective'),
      kpi: document.getElementById('kpi'),
      season: document.getElementById('season'),
      resetBtn: document.getElementById('resetBtn'),
      status: document.getElementById('status'),
      groups: {
        upper: document.getElementById('upper'),
        mid: document.getElementById('mid'),
        lower: document.getElementById('lower'),
        retention: document.getElementById('retention')
      },
      counts: {
        upper: document.getElementById('count-upper'),
        mid: document.getElementById('count-mid'),
        lower: document.getElementById('count-lower'),
        retention: document.getElementById('count-retention')
      }
    };

    const badgeClass = {
      'Pre-built': 'pre-built',
      'Custom': 'custom',
      'Predictive': 'predictive',
      'Retargeting': 'retargeting'
    };

    function metricMax(metric) {
      return Math.max(...Object.values(BENCHMARKS).map(v => v[metric] || 0), 0.0001);
    }

    function normalizeMetric(a, metric) {
      const val = (BENCHMARKS[a.name] && BENCHMARKS[a.name][metric]) || 0;
      return val / metricMax(metric);
    }

    function scoreAudience(a, f) {
      if (f.category && !a.categories.includes(f.category)) return -1;

      let score = 0;
      score += (!f.category || a.categories.includes(f.category)) ? 2.0 : 0;
      score += (!f.objective || a.objectives.includes(f.objective)) ? 2.0 : -0.6;
      score += (!f.season || f.season === 'None' || a.seasons.includes(f.season) || a.seasons.includes('None')) ? 1.0 : -0.4;

      if (f.kpi) {
        const metric = KPI_TO_METRIC[f.kpi];
        score += 3.0 * normalizeMetric(a, metric);
        score += a.kpis.includes(f.kpi) ? 0.6 : -0.2;
      } else {
        score +=
          1.0 * normalizeMetric(a, 'roas') +
          1.0 * normalizeMetric(a, 'conversions') +
          1.0 * normalizeMetric(a, 'ctr');
      }

      // If objective is New Buyers, bias toward stronger New to Brand audiences.
      if (f.objective === 'New Buyers') {
        score += 2.0 * normalizeMetric(a, 'ntb');
      }

      return score;
    }

    function audienceCard(a) {
      const m = BENCHMARKS[a.name] || { roas: 0, conversions: 0, ctr: 0, ntb: 0 };
      return `
        <article class="aud">
          <div class="aud-top">
            <div class="aud-name">${a.name}</div>
            <span class="badge ${badgeClass[a.type] || ''}">${a.type}</span>
          </div>
          <div class="reason">${a.reason}</div>
          <div class="reason" style="margin-top:8px;color:#2e3038;">
            Data signals: <b>ROAS ${m.roas.toFixed(1)}x</b> ·
            <b>Conv ${m.conversions.toLocaleString()}</b> ·
            <b>CTR ${m.ctr.toFixed(2)}%</b> ·
            <b>New to Brand ${m.ntb.toFixed(1)}%</b>
          </div>
        </article>
      `;
    }

    function getFilters() {
      return {
        category: ids.category.value,
        objective: ids.objective.value,
        kpi: ids.kpi.value,
        season: ids.season.value
      };
    }

    function render() {
      const f = getFilters();

      const filtered = audiences
        .map(a => ({ ...a, _score: scoreAudience(a, f) }))
        .filter(a => a._score >= 2.2)
        .sort((a, b) => b._score - a._score)
        .slice(0, 20);

      const grouped = { upper: [], mid: [], lower: [], retention: [] };
      filtered.forEach(a => grouped[a.funnel].push(a));

      Object.keys(grouped).forEach(key => {
        const bucket = grouped[key].slice(0, 5);
        ids.counts[key].textContent = bucket.length;
        ids.groups[key].innerHTML = bucket.length
          ? bucket.map(audienceCard).join('')
          : '<div class="empty">No matches. Try broadening filters.</div>';
      });

      const used = [];
      if (f.category) used.push(`Category: <b>${f.category}</b>`);
      if (f.objective) used.push(`Objective: <b>${f.objective}</b>`);
      if (f.kpi) used.push(`KPI: <b>${f.kpi}</b>`);
      if (f.season && f.season !== 'None') used.push(`Season/Event: <b>${f.season}</b>`);

      ids.status.innerHTML = used.length
        ? `Showing <b>${filtered.length}</b> recommendations · ${used.join(' · ')} · Ranked by <b>data-backed audience score</b>`
        : `Showing <b>${audiences.length}</b> audiences (no filters applied) · Ranked by <b>data-backed audience score</b>`;
    }

    function resetFilters() {
      ids.category.value = '';
      ids.objective.value = '';
      ids.kpi.value = '';
      ids.season.value = 'None';
      render();
    }

    [ids.category, ids.objective, ids.kpi, ids.season].forEach(el => el.addEventListener('change', render));
    ids.resetBtn.addEventListener('click', resetFilters);
    render();
  </script>
</body>
</html>
